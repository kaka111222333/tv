name: Daily Tasks (Bing Wallpaper, EPG Sync, Pages Deploy)

on:
  # 5:00,17:00运行一次
  schedule:
    - cron: '0 9,21 * * *'   # 每天 5:00,17:00 (UTC+8)
  
  # 支持手动触发
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 设置权限
permissions:
  contents: write  # 用于Git提交
  pages: write     # 用于Pages部署
  id-token: write  # 用于Pages部署

# Pages部署的并发控制
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 任务1: 获取并压缩Bing壁纸
  get_today_wallpaper:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: master
        fetch-depth: 0

    - name: Configure Git
      run: |
        git config --local user.email "fankaijiang@hotmail.com"
        git config --local user.name "kaka111222333"
        git config pull.rebase false

    - name: Pull latest changes BEFORE creating files
      run: |
        echo "先拉取最新远程更改..."
        git pull origin master
        echo "✅ 已拉取最新远程更改"

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq wget curl imagemagick
        convert --version

    - name: Create directories
      run: |
        mkdir -p bing
        mkdir -p bing/archive

    - name: Archive previous wallpaper
      run: |
        if [ -f "bing/bing.jpg" ]; then
          DATE=$(date +'%Y%m%d')
          cp bing/bing.jpg "bing/archive/bing_${DATE}.jpg"
          echo "已存档今日壁纸到 bing/archive/bing_${DATE}.jpg"
        fi

    - name: Clean up old files
      run: |
        echo "清理旧文件..."
        rm -f bing/bing.jpg
        rm -f bing/bing_info.txt
        rm -f bing/bing_data.json

    - name: Download Today's Bing Wallpaper
      run: |
        JSON_RESPONSE=$(curl -sL "https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=en-US")
        
        IMAGE_BASE_URL=$(echo "$JSON_RESPONSE" | jq -r '.images[0].url')
        COPYRIGHT=$(echo "$JSON_RESPONSE" | jq -r '.images[0].copyright')
        TITLE=$(echo "$JSON_RESPONSE" | jq -r '.images[0].title')
        DATE=$(date +'%Y-%m-%d')
        
        FULL_IMAGE_URL="https://www.bing.com${IMAGE_BASE_URL/1920x1080/UHD}"
        
        echo "正在下载必应每日壁纸: $FULL_IMAGE_URL"
        echo "标题: $TITLE"
        
        wget -q -O bing_uhd.jpg "$FULL_IMAGE_URL"
        
        UHD_SIZE=$(stat -f%z bing_uhd.jpg 2>/dev/null || stat -c%s bing_uhd.jpg 2>/dev/null)
        echo "UHD图片大小: $((UHD_SIZE/1024/1024)) MB"
        
        echo "压缩图片为1920x1080分辨率..."
        convert bing_uhd.jpg -resize 1920x1080\> -quality 85 bing/bing.jpg
        
        COMPRESSED_SIZE=$(stat -f%z bing/bing.jpg 2>/dev/null || stat -c%s bing/bing.jpg 2>/dev/null)
        echo "压缩后大小: $((COMPRESSED_SIZE/1024)) KB"
        echo "压缩率: $(( (UHD_SIZE - COMPRESSED_SIZE) * 100 / UHD_SIZE ))%"
        
        rm -f bing_uhd.jpg
        
        IMAGE_INFO=$(identify bing/bing.jpg 2>/dev/null || echo "无法获取图片信息")
        echo "压缩后图片信息: $IMAGE_INFO"

    - name: Create info files
      run: |
        DATE=$(date +'%Y-%m-%d')
        
        JSON_RESPONSE=$(curl -sL "https://www.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=en-US")
        COPYRIGHT=$(echo "$JSON_RESPONSE" | jq -r '.images[0].copyright')
        TITLE=$(echo "$JSON_RESPONSE" | jq -r '.images[0].title')
        
        echo "必应每日壁纸 - $DATE" > bing/bing_info.txt
        echo "标题: $TITLE" >> bing/bing_info.txt
        echo "版权信息: $COPYRIGHT" >> bing/bing_info.txt
        echo "原始链接: https://www.bing.com$(echo "$JSON_RESPONSE" | jq -r '.images[0].url')" >> bing/bing_info.txt
        echo "下载时间: $(date +'%Y-%m-%d %H:%M:%S UTC%z')" >> bing/bing_info.txt
        echo "分辨率: 1920×1080" >> bing/bing_info.txt
        
        FILE_SIZE=$(stat -f%z bing/bing.jpg 2>/dev/null || stat -c%s bing/bing.jpg 2>/dev/null)
        echo "文件大小: $((FILE_SIZE/1024)) KB" >> bing/bing_info.txt
        
        echo '{
          "date": "'$DATE'",
          "title": "'$TITLE'",
          "copyright": "'$COPYRIGHT'",
          "image_url": "bing/bing.jpg",
          "original_url": "https://www.bing.com$(echo "$JSON_RESPONSE" | jq -r '.images[0].url')",
          "resolution": "1920x1080",
          "compressed": true
        }' > bing/bing_data.json

    - name: Verify files
      run: |
        echo "文件结构检查:"
        ls -lh bing/bing.jpg
        echo ""
        echo "图片详细信息:"
        identify bing/bing.jpg
        echo ""
        echo "壁纸预览信息:"
        echo "  - 分辨率: $(identify -format "%wx%h" bing/bing.jpg)"
        echo "  - 大小: $(du -h bing/bing.jpg | cut -f1)"

    - name: Commit and Push Changes
      run: |
        git add bing/
        
        if git status --porcelain | grep -q "M\|A"; then
          DATE=$(date +'%Y年%m月%d日')
          if [ -f "bing/bing_info.txt" ]; then
            IMAGE_TITLE=$(grep "标题:" bing/bing_info.txt | head -1 | cut -d: -f2- | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          else
            IMAGE_TITLE="必应壁纸"
          fi
          
          IMAGE_SIZE=$(du -h bing/bing.jpg | cut -f1)
          IMAGE_RES=$(identify -format "%wx%h" bing/bing.jpg 2>/dev/null || echo "1920x1080")
          
          COMMIT_MSG="更新必应壁纸 [$DATE] - ${IMAGE_TITLE:0:30} (${IMAGE_RES} - ${IMAGE_SIZE})"
          git commit -m "$COMMIT_MSG"
          git push origin master
          
          echo "✅ 壁纸已更新并压缩成功！"
          echo "📁 文件信息:"
          echo "  - 位置: bing/bing.jpg"
          echo "  - 分辨率: ${IMAGE_RES}"
          echo "  - 大小: ${IMAGE_SIZE}"
        else
          echo "没有文件被修改，跳过提交"
        fi

  # 任务2: 同步EPG数据（依赖任务1完成）
  sync-epg:
    runs-on: ubuntu-latest
    needs: get_today_wallpaper  # 等待任务1完成
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 创建 epg 目录
        run: mkdir -p ./epg

      - name: 下载 seven-days.xml.gz
        run: |
          curl -L -o ./epg/seven-days.xml.gz \
            https://raw.githubusercontent.com/plsy1/epg/main/e/seven-days.xml.gz
          echo "EPG文件下载完成："
          ls -lh ./epg/seven-days.xml.gz

      - name: 下载 README.md
        run: |
          curl -L -o ./README.md \
            https://raw.githubusercontent.com/plsy1/epg/main/README.md
          echo "README.md 下载完成："
          ls -lh ./README.md

      - name: 配置 Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 提交并推送
        run: |
          git pull origin master  # 先拉取最新更改（包括任务1的更新）
          git add ./epg/seven-days.xml.gz
          git add ./README.md
          
          if git diff --cached --quiet; then
            echo "文件内容没有变化，跳过提交"
          else
            echo "检测到文件变化，准备提交..."
            git commit -m "自动更新 EPG 数据及文档 - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:master
            echo "推送完成！"
          fi

  # 任务3: 部署静态内容到GitHub Pages（依赖任务2完成）
  deploy-pages:
    runs-on: ubuntu-latest
    needs: sync-epg  # 等待任务2完成
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
      
      - name: Pull latest changes
        run: git pull origin master
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
